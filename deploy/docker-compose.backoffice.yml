# Mevcut Restaurant/docker-compose.yml dosyasına aşağıdaki services bloğunu ekle
# (ya da bunu standalone compose dosyası olarak `docker compose -f` ile çalıştır).

services:
  backoffice:
    build:
      context: ../apps/backoffice
      dockerfile: Dockerfile
    image: gastrocore-backoffice:latest
    container_name: gastrocore-backoffice
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ../apps/backoffice/.env.production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - gastrocore-net

networks:
  gastrocore-net:
    external: true
