# GastroCore backoffice — nginx reverse proxy
# Yer: /etc/nginx/sites-available/backoffice.gastrocore.ch
# Aktif: sudo ln -s /etc/nginx/sites-available/backoffice.gastrocore.ch /etc/nginx/sites-enabled/
# Reload: sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d backoffice.gastrocore.ch
# certbot otomatik 443 server bloğunu ekler. Aşağıdaki 80 bloğu HTTPS'e yönlendirir.

server {
    listen 80;
    listen [::]:80;
    server_name backoffice.gastrocore.ch;

    # HTTP → HTTPS redirect (certbot kurulduktan sonra otomatik)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name backoffice.gastrocore.ch;

    # ssl_certificate / ssl_certificate_key — certbot tarafından eklenir
    # ssl_certificate     /etc/letsencrypt/live/backoffice.gastrocore.ch/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/backoffice.gastrocore.ch/privkey.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Strict-Transport-Security 6 ay
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # Static assets cache (Next.js _next/static)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public assets
    location /favicon.ico { proxy_pass http://127.0.0.1:3001; access_log off; }

    # App
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    client_max_body_size 10M;
}
