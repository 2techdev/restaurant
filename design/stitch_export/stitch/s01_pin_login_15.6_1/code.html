<body class="flex flex-col h-screen text-on-surface select-none overflow-hidden">

</div>
<div class="flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full shadow-sm">
<span class="material-symbols-outlined text-outline text-sm" data-icon="wifi_off">wifi_off</span>
<span class="text-label-sm font-semibold tracking-wide text-on-surface-variant uppercase text-xs">Offline Mode</span>

<div class="flex flex-col">

</div>
<div class="flex flex-col">
