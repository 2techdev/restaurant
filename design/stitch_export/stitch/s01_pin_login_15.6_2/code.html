<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GastroCore POS - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "outline": "#8c909f",
            "on-error": "#690005",
            "tertiary-container": "#c567f4",
            "surface-tint": "#afc6ff",
            "on-primary-container": "#00275f",
            "inverse-on-surface": "#2e3037",
            "tertiary-fixed": "#f6d9ff",
            "on-surface": "#e2e2eb",
            "tertiary": "#e8b3ff",
            "error": "#ffb4ab",
            "error-container": "#93000a",
            "on-secondary-fixed": "#002107",
            "on-tertiary-fixed-variant": "#7201a2",
            "on-primary-fixed": "#001a43",
            "surface-variant": "#33343b",
            "secondary-fixed-dim": "#53e16f",
            "outline-variant": "#424753",
            "on-primary-fixed-variant": "#004398",
            "on-tertiary": "#510074",
            "secondary-fixed": "#72fe88",
            "primary": "#afc6ff",
            "background": "#111319",
            "surface-container-lowest": "#0c0e14",
            "primary-fixed-dim": "#afc6ff",
            "surface-container-low": "#191b22",
            "primary-container": "#528dff",
            "surface-dim": "#111319",
            "primary-fixed": "#d9e2ff",
            "tertiary-fixed-dim": "#e8b3ff",
            "on-secondary-container": "#003a11",
            "on-primary": "#002d6c",
            "surface-container-highest": "#33343b",
            "secondary-container": "#05b046",
            "on-error-container": "#ffdad6",
            "on-tertiary-fixed": "#310048",
            "secondary": "#53e16f",
            "inverse-surface": "#e2e2eb",
            "surface-bright": "#373940",
            "surface-container": "#1e1f26",
            "inverse-primary": "#0059c6",
            "on-secondary-fixed-variant": "#00531c",
            "on-background": "#e2e2eb",
            "surface-container-high": "#282a30",
            "surface": "#111319",
            "on-secondary": "#003911",
            "on-tertiary-container": "#460066",
            "on-surface-variant": "#c2c6d6"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #111319;
      color: #e2e2eb;
      font-family: 'Inter', sans-serif;
    }
    .kinetic-gradient {
      background: linear-gradient(135deg, #afc6ff 0%, #528dff 100%);
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="overflow-hidden antialiased">
<!-- Suppression of Shell: Login is focused transactional -->
<!-- System Status Bar -->
<div class="fixed top-0 left-0 w-full h-12 flex justify-between items-center px-8 z-50">
<div class="flex items-center gap-2">
<span class="text-on-surface-variant text-sm font-medium">Terminal 01 - Main Floor</span>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 bg-error-container/20 px-3 py-1 rounded-full border border-error-container/30">
<span class="w-2 h-2 rounded-full bg-error animate-pulse"></span>
<span class="text-error text-[10px] font-bold tracking-widest uppercase">OFFLINE</span>
</div>
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-lg" data-icon="wifi">wifi</span>
<span class="text-sm font-bold">12:45 PM</span>
</div>
</div>
</div>
<!-- Main Login Canvas -->
<main class="relative h-screen w-screen flex flex-col items-center justify-center p-6">
<!-- Kinetic Background Accents -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Identity Header -->
<div class="flex flex-col items-center mb-12 text-center">
<h1 class="text-5xl font-black tracking-tighter flex items-center">
<span class="text-on-surface">Gastro</span>
<span class="text-primary-container">Core</span>
</h1>
<p class="mt-2 text-[10px] font-extrabold tracking-[0.4em] text-on-surface-variant opacity-60 uppercase">
        RESTAURANT POS SYSTEM
      </p>
</div>
<!-- User Selection Section -->
<div class="w-full max-w-4xl mb-16">
<div class="flex items-center justify-center gap-6 overflow-x-auto py-4 hide-scrollbar px-10">
<!-- Active User -->
<div class="flex flex-col items-center gap-4 transition-all duration-300">
<div class="relative">
<div class="w-24 h-24 rounded-full p-1 bg-primary-container ring-4 ring-primary-container/20">
<div class="w-full h-full rounded-full bg-surface-bright flex items-center justify-center">
<span class="text-2xl font-bold text-primary">MA</span>
</div>
</div>
<div class="absolute -bottom-1 -right-1 bg-secondary-container text-on-secondary-container w-7 h-7 rounded-full flex items-center justify-center shadow-lg border-2 border-surface">
<span class="material-symbols-outlined text-sm" data-icon="check" data-weight="fill">check</span>
</div>
</div>
<span class="text-sm font-bold text-on-surface tracking-tight">Marco A.</span>
</div>
<!-- Inactive Users -->
<div class="flex flex-col items-center gap-4 opacity-40 hover:opacity-100 transition-all duration-300 group cursor-pointer">
<div class="w-20 h-20 rounded-full bg-surface-container-high border-2 border-transparent group-hover:border-primary-container/40 flex items-center justify-center overflow-hidden">
<span class="text-xl font-medium text-on-surface-variant">JD</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Jane D.</span>
</div>
<div class="flex flex-col items-center gap-4 opacity-40 hover:opacity-100 transition-all duration-300 group cursor-pointer">
<div class="w-20 h-20 rounded-full bg-surface-container-high border-2 border-transparent group-hover:border-primary-container/40 flex items-center justify-center overflow-hidden">
<span class="text-xl font-medium text-on-surface-variant">RL</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Rick L.</span>
</div>
<div class="flex flex-col items-center gap-4 opacity-40 hover:opacity-100 transition-all duration-300 group cursor-pointer">
<div class="w-20 h-20 rounded-full bg-surface-container-high border-2 border-transparent group-hover:border-primary-container/40 flex items-center justify-center overflow-hidden">
<span class="text-xl font-medium text-on-surface-variant">SP</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Sarah P.</span>
</div>
<div class="flex flex-col items-center gap-4 opacity-40 hover:opacity-100 transition-all duration-300 group cursor-pointer">
<div class="w-20 h-20 rounded-full bg-surface-container-high border-2 border-transparent group-hover:border-primary-container/40 flex items-center justify-center overflow-hidden">
<span class="text-xl font-medium text-on-surface-variant">KM</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Kevin M.</span>
</div>
<div class="flex flex-col items-center gap-4 opacity-40 hover:opacity-100 transition-all duration-300 group cursor-pointer">
<div class="w-20 h-20 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center">
<span class="material-symbols-outlined text-outline-variant" data-icon="add">add</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Add User</span>
</div>
</div>
</div>
<!-- Pin Section -->
<div class="w-[380px] flex flex-col items-center">
<!-- PIN Dots Display -->
<div class="flex gap-4 mb-10 h-12 items-center">
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_15px_rgba(175,198,255,0.4)]"></div>
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_15px_rgba(175,198,255,0.4)]"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Keypad -->
<div class="grid grid-cols-3 gap-4 w-full">
<!-- Row 1 -->
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">1</button>
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">2</button>
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">3</button>
<!-- Row 2 -->
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">4</button>
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">5</button>
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">6</button>
<!-- Row 3 -->
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">7</button>
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">8</button>
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">9</button>
<!-- Row 4 -->
<button class="h-16 rounded-xl flex items-center justify-center text-sm font-bold text-error active:scale-95 transition-all uppercase tracking-widest">Clear</button>
<button class="h-16 rounded-xl bg-surface-container-high hover:bg-surface-bright active:scale-95 transition-all flex items-center justify-center text-2xl font-bold text-on-surface shadow-lg">0</button>
<button class="h-16 rounded-xl flex items-center justify-center text-error active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
<!-- Large Action Button -->
<button class="mt-8 w-full h-16 rounded-xl kinetic-gradient text-on-primary-container text-lg font-black tracking-widest uppercase shadow-2xl shadow-primary-container/20 active:scale-[0.98] transition-all">
        Enter Terminal
      </button>
</div>
<!-- Footer Meta -->
<div class="fixed bottom-10 flex flex-col items-center gap-1 opacity-40">
<span class="text-[10px] font-bold tracking-widest uppercase">GastroCore v4.2.0-stable</span>
<span class="text-[9px] font-medium italic">Handcrafted for Precision Gastronomy</span>
</div>
</main>
<!-- Side Decorative "Switch Device" -->
<div class="fixed right-0 top-1/2 -translate-y-1/2 bg-surface-container-low px-2 py-8 rounded-l-2xl border-l border-y border-outline-variant/10 cursor-pointer hover:bg-surface-container transition-colors group">
<div class="flex flex-col items-center gap-6">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="devices">devices</span>
<span class="[writing-mode:vertical-lr] text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant group-hover:text-on-surface transition-colors">Switch Terminal</span>
</div>
</div>
</body></html>
