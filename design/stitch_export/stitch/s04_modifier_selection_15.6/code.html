<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modifier Selection Dialog - GastroCore POS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary": "#e8b3ff",
              "on-tertiary": "#510074",
              "surface-container-lowest": "#0c0e14",
              "primary-fixed": "#d9e2ff",
              "on-surface-variant": "#c2c6d6",
              "on-error": "#690005",
              "on-secondary": "#003911",
              "on-error-container": "#ffdad6",
              "on-tertiary-container": "#460066",
              "error-container": "#93000a",
              "background": "#111319",
              "primary-container": "#528dff",
              "on-primary-container": "#00275f",
              "on-primary": "#002d6c",
              "primary-fixed-dim": "#afc6ff",
              "on-primary-fixed-variant": "#004398",
              "on-background": "#e2e2eb",
              "tertiary-fixed-dim": "#e8b3ff",
              "on-surface": "#e2e2eb",
              "tertiary-container": "#c567f4",
              "on-tertiary-fixed": "#310048",
              "secondary-container": "#05b046",
              "error": "#ffb4ab",
              "surface-container-highest": "#33343b",
              "primary": "#afc6ff",
              "secondary-fixed": "#72fe88",
              "outline-variant": "#424753",
              "surface-container": "#1e1f26",
              "surface-bright": "#373940",
              "on-secondary-fixed-variant": "#00531c",
              "inverse-on-surface": "#2e3037",
              "surface": "#111319",
              "secondary": "#53e16f",
              "surface-container-low": "#191b22",
              "surface-tint": "#afc6ff",
              "tertiary-fixed": "#f6d9ff",
              "on-primary-fixed": "#001a43",
              "inverse-primary": "#0059c6",
              "on-secondary-fixed": "#002107",
              "on-secondary-container": "#003a11",
              "inverse-surface": "#e2e2eb",
              "surface-variant": "#33343b",
              "outline": "#8c909f",
              "on-tertiary-fixed-variant": "#7201a2",
              "surface-container-high": "#282a30",
              "surface-dim": "#111319",
              "secondary-fixed-dim": "#53e16f"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { backdrop-filter: blur(24px); background-color: rgba(17, 19, 25, 0.85); }
        .active-glow { box-shadow: 0 0 24px 0 rgba(79, 140, 255, 0.25); }
    </style>
</head>
<body class="bg-surface-dim text-on-surface overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="bg-[#191B22] border-none shadow-[0_0_48px_0_rgba(79,140,255,0.06)] flex justify-between items-center w-full px-6 h-16 backdrop-blur-md bg-opacity-80 z-20">
<div class="flex items-center gap-8">
<h1 class="text-xl font-extrabold text-[#F0F0F5] tracking-tighter">Precision POS</h1>
<nav class="hidden md:flex gap-6 items-center h-full">
<a class="font-['Inter'] tracking-tight font-semibold text-[#8E8E9A] hover:text-[#F0F0F5] transition-colors" href="#">Dashboard</a>
<a class="font-['Inter'] tracking-tight font-semibold text-[#F0F0F5] border-b-2 border-[#4f8cff] pb-2" href="#">Tables</a>
<a class="font-['Inter'] tracking-tight font-semibold text-[#8E8E9A] hover:text-[#F0F0F5] transition-colors" href="#">Orders</a>
<a class="font-['Inter'] tracking-tight font-semibold text-[#8E8E9A] hover:text-[#F0F0F5] transition-colors" href="#">Kitchen</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-lg hover:bg-[#1E1F26] duration-200 text-[#8E8E9A] active:scale-95 transition-transform">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 rounded-lg hover:bg-[#1E1F26] duration-200 text-[#8E8E9A] active:scale-95 transition-transform">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="h-8 w-8 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-sm">person</span>
</div>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<!-- Sidebar -->
<aside class="fixed left-0 top-16 bottom-0 flex flex-col p-4 bg-[#191B22] dark:bg-[#191B22] docked h-full w-64 no-border space-y-4 z-10">
<div class="flex flex-col gap-1 mb-6 px-2">
<span class="text-lg font-bold text-[#F0F0F5]">Station 01</span>
<span class="text-xs text-[#8E8E9A]">Lead Server</span>
</div>
<div class="flex flex-col gap-2">
<a class="bg-gradient-to-r from-[#4f8cff] to-[#528DFF] text-[#111319] rounded-lg shadow-lg text-sm font-medium flex items-center gap-3 p-4 active:scale-[0.98] duration-150" href="#">
<span class="material-symbols-outlined">grid_view</span> Floor Plan
                </a>
<a class="text-[#8E8E9A] flex items-center gap-3 p-4 hover:bg-[#33343B] hover:text-[#F0F0F5] transition-colors text-sm font-medium" href="#">
<span class="material-symbols-outlined">bolt</span> Quick Serve
                </a>
<a class="text-[#8E8E9A] flex items-center gap-3 p-4 hover:bg-[#33343B] hover:text-[#F0F0F5] transition-colors text-sm font-medium" href="#">
<span class="material-symbols-outlined">receipt_long</span> Open Checks
                </a>
<a class="text-[#8E8E9A] flex items-center gap-3 p-4 hover:bg-[#33343B] hover:text-[#F0F0F5] transition-colors text-sm font-medium" href="#">
<span class="material-symbols-outlined">history</span> Recall
                </a>
</div>
<div class="mt-auto pt-4 flex flex-col gap-2">
<button class="flex items-center gap-3 p-4 text-[#8E8E9A] hover:text-[#F0F0F5] transition-colors text-sm font-medium">
<span class="material-symbols-outlined">help</span> Support
                </button>
<button class="flex items-center gap-3 p-4 text-[#8E8E9A] hover:text-[#F0F0F5] transition-colors text-sm font-medium">
<span class="material-symbols-outlined">lock</span> Lock
                </button>
</div>
</aside>
<!-- Main Content Area (Blurred Background) -->
<main class="ml-64 flex-1 p-6 grid grid-cols-12 gap-6 opacity-40">
<!-- Background Content Mockup -->
<div class="col-span-8 flex flex-col gap-6">
<div class="grid grid-cols-4 gap-4">
<div class="bg-surface-container-low h-32 rounded-xl border-outline-variant/10 border p-4"></div>
<div class="bg-surface-container-low h-32 rounded-xl border-outline-variant/10 border p-4"></div>
<div class="bg-surface-container-low h-32 rounded-xl border-outline-variant/10 border p-4"></div>
<div class="bg-surface-container-low h-32 rounded-xl border-outline-variant/10 border p-4"></div>
</div>
<div class="bg-surface-container rounded-xl flex-1 p-8 border-outline-variant/10 border"></div>
</div>
<div class="col-span-4 bg-surface-container-low rounded-xl border-outline-variant/10 border"></div>
</main>
</div>
<!-- MODAL OVERLAY: Modifier Selection Dialog -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-background/60 backdrop-blur-sm">
<div class="w-full max-w-4xl bg-surface-container-low rounded-3xl shadow-[0_0_80px_0_rgba(0,0,0,0.5)] overflow-hidden flex flex-col border border-outline-variant/10">
<!-- Modal Header -->
<div class="p-8 border-b border-outline-variant/10 flex justify-between items-start">
<div>
<h2 class="text-4xl font-extrabold tracking-tighter text-on-surface">Gastro Burger XL</h2>
<div class="mt-2 inline-flex items-center px-3 py-1 bg-primary-container/10 rounded-lg">
<span class="text-2xl font-bold text-primary-fixed-dim">395.00 ₺</span>
</div>
</div>
<button class="w-12 h-12 rounded-2xl bg-surface-container-highest flex items-center justify-center text-on-surface hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content (Scrollable Area) -->
<div class="flex-1 overflow-y-auto p-8 space-y-10">
<!-- REQUIRED: Pişme Derecesi -->
<section>
<div class="flex items-center justify-between mb-4">
<h3 class="text-lg font-semibold text-on-surface-variant flex items-center gap-2 uppercase tracking-widest text-xs">
                            Pişme Derecesi
                            <span class="bg-error-container text-on-error-container px-2 py-0.5 rounded text-[10px] font-bold">ZORUNLU</span>
</h3>
</div>
<div class="flex flex-wrap gap-4">
<button class="px-8 py-4 rounded-xl text-sm font-bold border-2 border-outline-variant/20 text-on-surface-variant hover:border-primary-fixed-dim/40 transition-all">Az</button>
<button class="px-8 py-4 rounded-xl text-sm font-bold border-2 border-primary-container bg-primary-container/10 text-primary-fixed-dim shadow-lg active-glow transition-all">Orta</button>
<button class="px-8 py-4 rounded-xl text-sm font-bold border-2 border-outline-variant/20 text-on-surface-variant hover:border-primary-fixed-dim/40 transition-all">İyi Pişmiş</button>
</div>
</section>
<!-- EXTRAS: Ekstralar -->
<section>
<h3 class="text-lg font-semibold text-on-surface-variant mb-4 uppercase tracking-widest text-xs">Ekstralar</h3>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<button class="flex items-center justify-between p-5 rounded-xl bg-surface-container-high border border-outline-variant/10 hover:bg-surface-bright transition-colors text-left group">
<div class="flex flex-col">
<span class="text-sm font-semibold text-on-surface">Duble Köfte</span>
<span class="text-xs text-primary-fixed-dim font-bold">+120 ₺</span>
</div>
<div class="w-6 h-6 rounded border-2 border-outline-variant/40 flex items-center justify-center group-active:scale-95">
<span class="material-symbols-outlined text-xs hidden">check</span>
</div>
</button>
<button class="flex items-center justify-between p-5 rounded-xl bg-primary-container/20 border-2 border-primary-container transition-colors text-left group active-glow">
<div class="flex flex-col">
<span class="text-sm font-semibold text-on-surface">Cheddar</span>
<span class="text-xs text-primary-fixed-dim font-bold">+25 ₺</span>
</div>
<div class="w-6 h-6 rounded bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-sm font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<button class="flex items-center justify-between p-5 rounded-xl bg-surface-container-high border border-outline-variant/10 hover:bg-surface-bright transition-colors text-left group">
<div class="flex flex-col">
<span class="text-sm font-semibold text-on-surface">Pastırma</span>
<span class="text-xs text-primary-fixed-dim font-bold">+45 ₺</span>
</div>
<div class="w-6 h-6 rounded border-2 border-outline-variant/40 flex items-center justify-center group-active:scale-95"></div>
</button>
</div>
</section>
<!-- QUANTITY & NOTES -->
<div class="grid grid-cols-12 gap-8 items-end">
<!-- Quantity Selector -->
<div class="col-span-5">
<h3 class="text-lg font-semibold text-on-surface-variant mb-4 uppercase tracking-widest text-xs">Adet</h3>
<div class="flex items-center bg-surface-container-highest rounded-2xl p-1 gap-1">
<button class="flex-1 h-14 rounded-xl bg-surface-container-high text-on-surface hover:bg-surface-bright transition-all active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="flex-[1.5] flex items-center justify-center text-3xl font-extrabold text-primary-fixed-dim">
                                1
                            </div>
<button class="flex-1 h-14 rounded-xl bg-surface-container-high text-on-surface hover:bg-surface-bright transition-all active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Notes Input -->
<div class="col-span-7">
<h3 class="text-lg font-semibold text-on-surface-variant mb-4 uppercase tracking-widest text-xs">Özel Notlar</h3>
<div class="relative group">
<input class="w-full h-16 bg-surface-container-high border-none rounded-2xl px-6 pt-1 text-on-surface focus:ring-2 focus:ring-primary-container placeholder:text-outline/50" placeholder="Özel not ekleyin..." type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline/40">edit_note</span>
</div>
</div>
</div>
</div>
<!-- Modal Footer (Total & Actions) -->
<div class="p-8 glass-panel border-t border-outline-variant/10 flex items-center gap-6">
<div class="flex flex-col min-w-[160px]">
<span class="text-xs font-bold text-outline uppercase tracking-wider">Toplam</span>
<span class="text-3xl font-extrabold text-on-surface">420.00 ₺</span>
</div>
<div class="flex-1 flex gap-4">
<button class="flex-1 h-16 rounded-2xl border-2 border-outline-variant/20 text-on-surface font-bold hover:bg-surface-container-highest transition-colors active:scale-95">
                        İptal
                    </button>
<button class="flex-[2] h-16 rounded-2xl bg-gradient-to-br from-primary-container to-on-primary-container text-on-primary-container font-extrabold text-lg shadow-xl hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined">shopping_cart_checkout</span>
                        Sipariş Ekle
                    </button>
</div>
</div>
</div>
</div>
<!-- Numpad Suggestion (FAB-like for rapid data entry) -->
<div class="fixed bottom-6 right-6 flex flex-col gap-3 pointer-events-none">
<div class="bg-secondary-container text-on-secondary-container px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 animate-pulse opacity-90 pointer-events-auto cursor-pointer">
<span class="material-symbols-outlined">bolt</span>
<span class="text-sm font-bold">HIZLI ÖDEME (F12)</span>
</div>
</div>
</body></html>
