<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GastroCore PIN Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#93000a",
              "on-primary-fixed-variant": "#004398",
              "primary-container": "#528dff",
              "error": "#ffb4ab",
              "on-secondary-fixed-variant": "#00531c",
              "on-secondary-container": "#003a11",
              "on-tertiary-container": "#460066",
              "on-surface": "#e2e2eb",
              "inverse-surface": "#e2e2eb",
              "surface-tint": "#afc6ff",
              "on-primary-container": "#00275f",
              "primary-fixed-dim": "#afc6ff",
              "tertiary-container": "#c567f4",
              "on-secondary": "#003911",
              "surface-variant": "#33343b",
              "tertiary-fixed": "#f6d9ff",
              "tertiary-fixed-dim": "#e8b3ff",
              "surface-container-high": "#282a30",
              "primary-fixed": "#d9e2ff",
              "surface-container": "#1e1f26",
              "outline": "#8c909f",
              "surface-bright": "#373940",
              "inverse-on-surface": "#2e3037",
              "on-tertiary-fixed": "#310048",
              "surface-container-lowest": "#0c0e14",
              "secondary-fixed": "#72fe88",
              "on-primary": "#002d6c",
              "on-error-container": "#ffdad6",
              "on-primary-fixed": "#001a43",
              "tertiary": "#e8b3ff",
              "on-background": "#e2e2eb",
              "secondary-container": "#05b046",
              "inverse-primary": "#0059c6",
              "outline-variant": "#424753",
              "secondary": "#53e16f",
              "surface-container-highest": "#33343b",
              "on-tertiary": "#510074",
              "secondary-fixed-dim": "#53e16f",
              "surface": "#111319",
              "background": "#111319",
              "primary": "#afc6ff",
              "on-surface-variant": "#c2c6d6",
              "surface-container-low": "#191b22",
              "on-error": "#690005",
              "surface-dim": "#111319",
              "on-secondary-fixed": "#002107",
              "on-tertiary-fixed-variant": "#7201a2"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6 select-none overflow-hidden">
<!-- Offline Indicator -->
<div class="fixed top-6 right-6 flex items-center gap-2 bg-[#ff9500] text-surface-dim px-3 py-1 rounded-full text-[0.6875rem] font-bold tracking-wider uppercase">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">cloud_off</span>
        Offline
    </div>
<div class="w-full max-w-md flex flex-col items-center">
<!-- Brand Header -->
<div class="text-center mb-12">
<div class="flex items-center justify-center gap-1 mb-1">
<span class="text-on-surface font-extrabold text-[2.75rem] tracking-tighter leading-none">Gastro</span>
<span class="text-primary-container font-extrabold text-[2.75rem] tracking-tighter leading-none">Core</span>
</div>
<p class="text-on-surface-variant font-medium text-sm tracking-widest uppercase">Restaurant POS System</p>
</div>
<!-- Staff Selection Section -->
<div class="w-full mb-10">
<div class="flex overflow-x-auto gap-6 pb-4 px-4 no-scrollbar items-center justify-center">
<!-- Staff Member: Selected -->
<div class="flex flex-col items-center gap-3 shrink-0 cursor-pointer group">
<div class="w-16 h-16 rounded-full bg-primary-container p-0.5 ring-4 ring-primary-container ring-offset-4 ring-offset-surface">
<div class="w-full h-full rounded-full bg-surface-container flex items-center justify-center text-primary-fixed-dim font-bold text-lg">
                            MA
                        </div>
</div>
<span class="text-primary font-bold text-[0.875rem]">Marco A.</span>
</div>
<!-- Staff Member: Idle 1 -->
<div class="flex flex-col items-center gap-3 shrink-0 cursor-pointer opacity-60 hover:opacity-100 transition-opacity">
<div class="w-16 h-16 rounded-full bg-tertiary p-0.5">
<div class="w-full h-full rounded-full bg-surface-container flex items-center justify-center text-tertiary-fixed-dim font-bold text-lg">
                            JD
                        </div>
</div>
<span class="text-on-surface-variant font-medium text-[0.875rem]">Jane D.</span>
</div>
<!-- Staff Member: Idle 2 -->
<div class="flex flex-col items-center gap-3 shrink-0 cursor-pointer opacity-60 hover:opacity-100 transition-opacity">
<div class="w-16 h-16 rounded-full bg-secondary p-0.5">
<div class="w-full h-full rounded-full bg-surface-container flex items-center justify-center text-secondary-fixed-dim font-bold text-lg">
                            KL
                        </div>
</div>
<span class="text-on-surface-variant font-medium text-[0.875rem]">Kevin L.</span>
</div>
<!-- Staff Member: Idle 3 -->
<div class="flex flex-col items-center gap-3 shrink-0 cursor-pointer opacity-60 hover:opacity-100 transition-opacity">
<div class="w-16 h-16 rounded-full bg-outline-variant p-0.5">
<div class="w-full h-full rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant font-bold text-lg">
                            SR
                        </div>
</div>
<span class="text-on-surface-variant font-medium text-[0.875rem]">Sarah R.</span>
</div>
</div>
</div>
<!-- PIN Display -->
<div class="flex gap-4 mb-10">
<div class="w-4 h-4 rounded-full bg-primary-container shadow-[0px_0px_12px_rgba(82,141,255,0.4)]"></div>
<div class="w-4 h-4 rounded-full bg-primary-container shadow-[0px_0px_12px_rgba(82,141,255,0.4)]"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
</div>
<!-- PIN Keypad -->
<div class="grid grid-cols-3 gap-4 w-full px-4">
<!-- Row 1 -->
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">1</button>
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">2</button>
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">3</button>
<!-- Row 2 -->
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">4</button>
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">5</button>
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">6</button>
<!-- Row 3 -->
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">7</button>
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">8</button>
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">9</button>
<!-- Row 4 -->
<button class="h-16 rounded-xl flex items-center justify-center text-error font-bold active:scale-95 transition-all">
<span class="material-symbols-outlined text-[28px]">backspace</span>
</button>
<button class="h-16 rounded-xl bg-surface-container-high flex items-center justify-center text-2xl font-bold text-on-surface active:scale-95 active:bg-surface-bright transition-all">0</button>
<button class="h-16 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-on-primary-container active:scale-95 transition-all">
<span class="material-symbols-outlined text-[28px] font-bold" style="font-variation-settings: 'FILL' 1;">login</span>
</button>
</div>
<!-- Footer Actions -->
<div class="mt-12 w-full flex justify-between px-6">
<button class="text-on-surface-variant font-semibold text-sm tracking-wide uppercase flex items-center gap-2 hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[18px]">help_center</span>
                Forgot PIN
            </button>
<button class="text-on-surface-variant font-semibold text-sm tracking-wide uppercase flex items-center gap-2 hover:text-on-surface transition-colors">
                System Info
                <span class="material-symbols-outlined text-[18px]">info</span>
</button>
</div>
</div>
<!-- Background Decorative Elements (Ambient Occlusion style) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container opacity-[0.03] blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary-container opacity-[0.03] blur-[120px] rounded-full pointer-events-none"></div>
</body></html>
