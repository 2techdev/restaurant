name: gastrocore_boss
description: "GastroCore Boss — owner mobile dashboard."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # GastroCore shared packages
  gastrocore_models:
    path: ../../packages/gastrocore_models
  gastrocore_api:
    path: ../../packages/gastrocore_api
  gastrocore_ui:
    path: ../../packages/gastrocore_ui

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  http: ^1.3.0
  web_socket_channel: ^3.0.2

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.69.0

  # Date / number formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
