name: gastrocore_dashboard
description: "GastroCore – Web Dashboard & Admin Panel for restaurant managers"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  http: ^1.3.0

  # Date/Time & i18n
  intl: ^0.20.2

  # Persistent state (auth token, theme pref)
  shared_preferences: ^2.3.2

  # Icons
  cupertino_icons: ^1.0.8

  # Charts
  fl_chart: ^0.69.0

  # Collection utilities
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
