version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gastrocore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gastrocore
      POSTGRES_USER: gastrocore
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — see infra/deploy/.env.example}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastrocore"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../../server
      dockerfile: Dockerfile
    container_name: gastrocore-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8090
      ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgres://gastrocore:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/gastrocore?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — see .env.example}
      LICENSE_SIGNING_KEY: ${LICENSE_SIGNING_KEY:?LICENSE_SIGNING_KEY is required — see .env.example}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "127.0.0.1:8090:8090"

  redis:
    image: redis:7-alpine
    container_name: gastrocore-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
