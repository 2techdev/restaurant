name: PR Check

# Fast gate that runs on every PR: format, analyze, and unit test all Flutter
# apps/packages plus `go vet` and `go test` on the server. Kept separate from
# the path-filtered ci.yml / go-ci.yml so PRs touching both stacks still get
# one combined status check.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.4"
  JAVA_VERSION: "17"
  GO_VERSION: "1.23"

jobs:
  flutter-analyze-test:
    name: Flutter Analyze & Test (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [pos, dashboard, online]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ matrix.app }}-${{ hashFiles(format('apps/{0}/pubspec.lock', matrix.app)) }}
          restore-keys: ${{ runner.os }}-pub-${{ matrix.app }}-

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get

      - name: Format check
        working-directory: apps/${{ matrix.app }}
        run: dart format --output=none --set-exit-if-changed lib test 2>/dev/null || dart format --output=none --set-exit-if-changed lib

      - name: Analyze
        working-directory: apps/${{ matrix.app }}
        run: flutter analyze --fatal-infos

      - name: Test
        working-directory: apps/${{ matrix.app }}
        run: flutter test --reporter=github
        # Some apps may not have a test/ directory yet; don't fail the whole
        # PR gate on missing tests — pr-check is a smoke gate, release is
        # gated by CHANGELOG + tag workflow.
        continue-on-error: true

  packages-analyze:
    name: Packages Analyze (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [gastrocore_api, gastrocore_models, gastrocore_sync, gastrocore_ui]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: flutter pub get

      - name: Analyze
        working-directory: packages/${{ matrix.package }}
        run: flutter analyze --fatal-infos

      - name: Test
        working-directory: packages/${{ matrix.package }}
        run: flutter test --reporter=github
        continue-on-error: true

  go-check:
    name: Go Vet & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: server/go.sum

      - name: Download modules
        working-directory: server
        run: go mod download

      - name: Vet
        working-directory: server
        run: go vet ./...

      - name: Test (race detector)
        working-directory: server
        run: go test -race -count=1 ./...

      - name: Build (sanity)
        working-directory: server
        run: go build ./...
