name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.4"
  JAVA_VERSION: "17"

jobs:
  analyze-and-test:
    name: Analyze & Test
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum

      - name: Run Go tests
        working-directory: server
        run: go test -race -count=1 ./...

  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('apps/pos/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        working-directory: apps/pos
        run: flutter pub get

      - name: Analyze (fatal-infos)
        working-directory: apps/pos
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        working-directory: apps/pos
        run: flutter test --coverage --reporter=github

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage
          path: apps/pos/coverage/lcov.info
          retention-days: 7

  build-apks:
    name: Build APK — ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    needs: analyze-and-test

    strategy:
      fail-fast: false
      matrix:
        flavor: [pos, waiter, kiosk, kds, ods]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('apps/pos/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/pos/android/**/*.gradle*', 'apps/pos/android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        working-directory: apps/pos
        run: flutter pub get

      - name: Create key.properties
        working-directory: apps/pos/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/gastrocore-release.jks
          cat > key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=gastrocore-release.jks
          EOF

      - name: Build APK — ${{ matrix.flavor }}
        working-directory: apps/pos
        run: flutter build apk --flavor ${{ matrix.flavor }} --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gastrocore-${{ matrix.flavor }}-release
          path: apps/pos/build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-release.apk
          retention-days: 30
