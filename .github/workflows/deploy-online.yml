name: Deploy Online Ordering

# ─────────────────────────────────────────────────────────────────────────────
# Builds Flutter web + Go server binary, uploads both as artifacts, and
# deploys the Flutter web to GitHub Pages.
#
# SSH to the VPS (192.168.1.134) is done LOCALLY — port 22 is not reachable
# from GitHub's runners on the public IP. After this workflow completes:
#
#   1. Download the "gastrocore-server-linux" artifact from the Actions run.
#      OR just run from the repo root:
#
#      ./infra/deploy/deploy.sh
#
#   The script builds + deploys everything over LAN SSH automatically.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "apps/online/**"
      - "server/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/online/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Build Flutter web app
  # ───────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Flutter build web (release)
        working-directory: apps/online
        run: flutter build web --release

      - name: Add CNAME for custom domain
        run: echo "pos.2tech.ch" > apps/online/build/web/CNAME

      - name: Copy standalone demo page to /demo/
        run: |
          mkdir -p apps/online/build/web/demo
          cp apps/online/web/demo/index.html apps/online/build/web/demo/index.html

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: online-web
          path: apps/online/build/web/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Cross-compile Go server for linux/amd64
  #    Artifact can be downloaded and deployed via infra/deploy/deploy.sh
  # ───────────────────────────────────────────────────────────────────────────
  build-server:
    name: Build Go Server (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Cross-compile for linux/amd64
        working-directory: server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          mkdir -p bin
          go build -ldflags="-s -w" -o bin/gastrocore-server-linux ./cmd/server

      - name: Upload server binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gastrocore-server-linux
          path: server/bin/gastrocore-server-linux
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Deploy Flutter web to GitHub Pages (custom domain: pos.2tech.ch)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: online-web
          path: ./web

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          cname: pos.2tech.ch

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Summary — remind how to deploy to VPS
  # ───────────────────────────────────────────────────────────────────────────
  deploy-instructions:
    name: VPS Deploy Instructions
    needs: [build-web, build-server]
    runs-on: ubuntu-latest
    steps:
      - name: Print local deploy instructions
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  VPS DEPLOY — run from your local machine (LAN access)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  # Full deploy (builds + pushes to 192.168.1.134):"
          echo "  ./infra/deploy/deploy.sh"
          echo ""
          echo "  # Build only (no network access needed):"
          echo "  ./infra/deploy/deploy.sh --build-only"
          echo ""
          echo "  # Skip Flutter web rebuild (binary only):"
          echo "  ./infra/deploy/deploy.sh --no-web"
          echo ""
          echo "  Artifacts available for manual download:"
          echo "    • gastrocore-server-linux  (Go binary, linux/amd64)"
          echo "    • online-web               (Flutter web build)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
