name: Deploy Online Ordering

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build Flutter web app + bundle standalone demo page
  # ─────────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Flutter build web (release)
        working-directory: apps/online
        run: flutter build web --release

      - name: Add CNAME for custom domain
        run: echo "pos.2tech.ch" > apps/online/build/web/CNAME

      - name: Copy standalone demo page to /demo/
        run: |
          mkdir -p apps/online/build/web/demo
          cp apps/online/web/demo/index.html apps/online/build/web/demo/index.html

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: online-web
          path: apps/online/build/web/

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Deploy to GitHub Pages (custom domain: pos.2tech.ch)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: online-web
          path: ./web

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          cname: pos.2tech.ch

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy Go server + web files to pos.2tech.ch via SSH
  #    (non-blocking — continues even if SSH is unavailable)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-server:
    name: Deploy to pos.2tech.ch Server
    needs: build-web
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: online-web
          path: ./web

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Cross-compile Go server for Linux amd64
        working-directory: server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o bin/gastrocore-server-linux ./cmd/server

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy web files
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          WEB_PATH: /home/tech/gastrocore/web/dist
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 $USER@$HOST \
            "mkdir -p $WEB_PATH && rm -rf $WEB_PATH/*"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r \
            ./web/* $USER@$HOST:$WEB_PATH/

      - name: Deploy Go binary and restart
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            server/bin/gastrocore-server-linux $USER@$HOST:/tmp/gastrocore-server-new
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 $USER@$HOST "
            chmod +x /tmp/gastrocore-server-new
            sudo mv /tmp/gastrocore-server-new /usr/local/bin/gastrocore-server
            sudo systemctl restart gastrocore 2>/dev/null || \
            sudo pkill -f gastrocore-server && sleep 1 && \
            sudo /usr/local/bin/gastrocore-server &
            echo 'Deployed successfully'
          "
