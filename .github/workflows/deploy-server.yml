name: Deploy Server

# Builds the Go server as a Docker image, pushes it to GitHub Container
# Registry, and triggers a rolling restart on the VPS. Replaces the ad-hoc
# scp flow in deploy-online.yml with a reproducible image-based deploy.
#
# Required repo secrets:
#   SSH_PRIVATE_KEY — private key authorized on the VPS
#   SERVER_HOST     — VPS hostname or IP
#   SERVER_USER     — SSH user (typically `tech`)
#
# On the VPS, /home/tech/gastrocore/docker-compose.prod.yml must reference
# `ghcr.io/2techdev/gastrocore-server:latest` (or a pinned tag) and read
# secrets from /home/tech/gastrocore/.env (see infra/deploy/.env.example).

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "infra/deploy/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gastrocore-server

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_SHA::12}"
          fi
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building $REGISTRY/$IMAGE_NAME:$TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Rolling Restart on VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy docker-compose to VPS
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            infra/deploy/docker-compose.prod.yml \
            $USER@$HOST:/home/tech/gastrocore/docker-compose.prod.yml

      - name: Pull image and restart
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $USER@$HOST "bash -se" <<EOF
            set -euo pipefail
            cd /home/tech/gastrocore
            # Refuse to start without required secrets — compose.prod uses \${VAR:?error}.
            test -f .env || { echo 'ERROR: /home/tech/gastrocore/.env missing'; exit 1; }
            echo "GASTROCORE_IMAGE_TAG=${IMAGE_TAG}" >> .env.deploy
            docker compose --env-file .env --env-file .env.deploy \
              -f docker-compose.prod.yml pull server
            docker compose --env-file .env --env-file .env.deploy \
              -f docker-compose.prod.yml up -d --no-deps server
            docker image prune -f
            echo "Deployed ${IMAGE_TAG}"
          EOF

      - name: Health check
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          # Server is behind nginx on 8090 locally, exposed via HTTPS.
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 5 "https://api.2tech.ch/health" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1
        continue-on-error: true
