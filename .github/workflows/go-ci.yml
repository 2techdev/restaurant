name: Go CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Download modules
        working-directory: server
        run: go mod download

      - name: Vet
        working-directory: server
        run: go vet ./...

      - name: Test (race detector + coverage)
        working-directory: server
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out
          retention-days: 7

      - name: Build server binary
        working-directory: server
        run: go build -o gastrocore-server ./cmd/server

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: gastrocore-server-linux-amd64
          path: server/gastrocore-server
          retention-days: 7
