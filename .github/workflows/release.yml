name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-apks:
    name: Build APK — ${{ matrix.flavor }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        flavor: [pos, waiter, kiosk, kds, ods]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true
          cache-key: flutter-${{ hashFiles('apps/pos/pubspec.lock') }}

      - name: Install dependencies
        working-directory: apps/pos
        run: flutter pub get

      - name: Create key.properties
        working-directory: apps/pos/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/gastrocore-release.jks
          cat > key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=gastrocore-release.jks
          EOF

      - name: Build APK — ${{ matrix.flavor }}
        working-directory: apps/pos
        run: flutter build apk --flavor ${{ matrix.flavor }} --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gastrocore-${{ matrix.flavor }}-release
          path: apps/pos/build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-release.apk

  build-server:
    name: Build Go Server (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Download modules
        working-directory: server
        run: go mod download

      - name: Build server binary
        working-directory: server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o gastrocore-server \
            ./cmd/server

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: gastrocore-server-linux-amd64
          path: server/gastrocore-server

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-apks, build-server]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts for release
        run: |
          mkdir -p release-assets
          find dist/ -type f \( -name "*.apk" -o -name "gastrocore-server" \) \
            -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Extract changelog for this version
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi
          echo "$NOTES" > release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GastroCore ${{ github.ref_name }}
          body_path: release-notes.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/*
