version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gastrocore
      POSTGRES_USER: gastrocore
      POSTGRES_PASSWORD: gastrocore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastrocore"]
      interval: 5s
      timeout: 5s
      retries: 5

  gastrocore-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgres://gastrocore:gastrocore@postgres:5432/gastrocore?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: 24h
      LICENSE_SIGNING_KEY: ${LICENSE_SIGNING_KEY:-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
